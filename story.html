<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Realms</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="game.js"></script>
</head>

<body>
   
    <nav id="inventory-window">
        <div id="inventory-titlebar">
            <img src="Images/backpack.webp" alt="Inventory" id="inventory-icon">
            <span id="inventory-label">Inventory</span>
            <button id="inventory-close" onclick="closeInventory()">X</button>
        </div>
        <div id="inventory-body">
            <div id="inventory-grid">
                <div class="inventory-slot" data-slot="0"></div>
                <div class="inventory-slot" data-slot="1"></div>
                <div class="inventory-slot" data-slot="2"></div>
                <div class="inventory-slot" data-slot="3"></div>
                <div class="inventory-slot" data-slot="4"></div>
                <div class="inventory-slot" data-slot="5"></div>
                <div class="inventory-slot" data-slot="6"></div>
                <div class="inventory-slot" data-slot="7"></div>
                <div class="inventory-slot" data-slot="8"></div>
                <div class="inventory-slot" data-slot="9"></div>
            </div>
        </div>
        <div id="inventory-tooltip">
            <div id="tooltip-name"></div>
            <div id="tooltip-desc"></div>
        </div>
    </nav>
    <div id="hud">
        <button id="inventory-toggle" class="btn" type="button">Inventory</button>
        <div id="health-bar"></div>
    </div>

    <main id="menu" class="page">
        <h1>Mystic Realms</h1>
        <button class="btn" type="button" id="playBtn">Play</button>
    </main>

    <main id="ordinary-world" class="page" style="display: none;">
        <div id="storyContainer">
            <div id="story-box"></div>
            <div id="choice"></div>
        </div>
    </main>

</body>

</html>
